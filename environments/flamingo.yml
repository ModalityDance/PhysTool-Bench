name: flamingo_env
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
    - torch==2.4.0 --index-url https://download.pytorch.org/whl/cu121
    - torchvision==0.19.0
    - torchaudio==2.4.0
    - transformers==4.28.1
    - open-flamingo==2.0.1 --no-deps
    - einops
    - einops-exts
    - open_clip_torch
    - huggingface-hub
    - Pillow
    - accelerate
    - sentencepiece