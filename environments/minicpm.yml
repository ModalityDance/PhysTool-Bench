name: minicpm_env
channels:
  - pytorch
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - pip:
    - --upgrade torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cu124
    - transformers<5.0.0
    - timm>=1.0.0
    - accelerate>=1.0.0
    - sentencepiece
    - pillow
    - decord
    - einops
    - minicpmo
    - hyperpyyaml
    - speechbrain
    - librosa
    - onnx
    - onnxruntime-gpu